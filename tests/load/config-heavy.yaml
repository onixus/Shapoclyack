# Heavy synthetic load test: per-run dirs, larger fan-out, resume checkpoint.
runtime:
  mode: safe
  retries: 1
  timeout_seconds: 600
  nse_timeout_seconds: 120
  nse_concurrency: 4
  nse_max_rate: 0
  nse_hosts_per_scan: 8
  discover_concurrency: 1
  ports_concurrency: 1
  per_run_output: true

profiles:
  safe:
    discover_rate: 3000
    port_rate: 3000
    top_ports: 100
    nmap_timing: T4
    nse_profile: load
    nse_concurrency: 4
  balanced:
    discover_rate: 3000
    port_rate: 3000
    top_ports: 100
    nmap_timing: T4
    nse_profile: load
    nse_concurrency: 4
  fast:
    discover_rate: 3000
    port_rate: 3000
    top_ports: 100
    nmap_timing: T4
    nse_profile: load
    nse_concurrency: 4

batching:
  enabled: true
  ipv4_prefix: 24
  max_targets_per_batch: 4

discovery:
  source: naabu
  # Targets are container IPs listed individually — skip ping sweep to save time in CI.
  skip_discovery: true

ports:
  source: naabu
  custom_ports_file: scanner/inputs/ports.txt

nse_profiles:
  load:
    # Fast offline scripts — default NSE suite is too slow at 32+ hosts on GHA.
    scripts: "banner"
    version_detection: true
    os_detection: false

reporting:
  markdown_summary: true
  html_summary: true
  csv_export: true
  json_export: true
