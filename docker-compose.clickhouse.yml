# ClickHouse auto-wire overlay for Shapoclyack compose.
#
# Usage (with NATS ingest path):
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.nats.yml \
#     -f docker-compose.clickhouse.yml \
#     --profile nats --profile clickhouse up --build
#
# Sets OCTO_CLICKHOUSE_URL and waits for ClickHouse HTTP ping before starting aio.

services:
  clickhouse:
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  shapoclyack:
    environment:
      OCTO_CLICKHOUSE_URL: ${OCTO_CLICKHOUSE_URL:-http://clickhouse:8123}
      OCTO_CH_INGEST_ENABLED: ${OCTO_CH_INGEST_ENABLED:-true}
    depends_on:
      clickhouse:
        condition: service_healthy
