runtime:
  mode: balanced
  output_dir: scanner/output
  state_dir: scanner/state
  logs_dir: scanner/output/logs
  retries: 2
  timeout_seconds: 1800
  # Per-host nmap (NSE/OS) timeout, separate from the global command timeout (max 600 s).
  nse_timeout_seconds: 600
  # Default number of nmap processes run in parallel during the NSE/OS stage.
  nse_concurrency: 4
  # Global packets/sec budget for the NSE/OS stage, shared across all parallel
  # nmap processes (each gets nse_max_rate / nse_concurrency). 0 = unlimited.
  nse_max_rate: 0
  # Hosts scanned per nmap process (reduces startup overhead). 1 = one host per nmap.
  nse_hosts_per_scan: 8
  # Parallel naabu batches for discovery and port scan (each batch is independent).
  discover_concurrency: 4
  ports_concurrency: 4
  # Set true or pass --skip-nse for L1-only runs (discover + ports). Re-run with --resume for NSE.
  skip_nse: false
  keep_intermediate: true
  # Each run writes to output_dir/runs/<run_id>/ and state_dir/runs/<run_id>/.
  per_run_output: true
  log_max_bytes: 10485760
  log_backup_count: 5

profiles:
  safe:
    discover_rate: 2000
    port_rate: 1000
    top_ports: 100
    nmap_timing: T3
    nse_profile: baseline
    nse_concurrency: 2
    nse_max_rate: 500
  balanced:
    # Slightly below prior 6000 — closer to realistic-bench completeness vs raw speed.
    discover_rate: 4000
    port_rate: 3000
    top_ports: 1000
    nmap_timing: T4
    nse_profile: vuln
    nse_concurrency: 4
    nse_max_rate: 2000
  fast:
    discover_rate: 10000
    port_rate: 7000
    top_ports: 1000
    nmap_timing: T4
    nse_profile: vuln
    nse_concurrency: 8
    nse_max_rate: 5000

batching:
  # Split work into resumable batches so a single huge naabu command never
  # hits the global timeout, a failed batch does not abort the whole run, and
  # --resume skips finished batches.
  enabled: true
  # IPv4 networks larger than this prefix are split into /ipv4_prefix batches
  # (e.g. a /16 becomes 256 x /24). Finer than /20 for resume (realistic bench).
  ipv4_prefix: 24
  # Single IPs / IPv6 / small nets are grouped into batches of this many targets.
  max_targets_per_batch: 1024

discovery:
  source: naabu
  profile: auto              # auto | fast | balanced | thorough | custom
  skip_discovery: false
  skip_known_alive: true
  disjoint_batches: true
  adaptive:
    enabled: true
    wave2_rate: 2500
    min_gap: 1
  exclude_alive: []
  exclude_last_octets: []
  verify:
    # Promote realistic-bench verify pass to cut false negatives on flaky nets.
    enabled: true
    rate: 1250
  icmp:
    enabled: false
    tool: fping
    timeout_ms: 500
    retries: 1
  tcp_probe:
    enabled: false
    ports: [80, 443, 22]
  probe_order: [icmp, tcp, naabu]
  hostnames:
    forward: true
    reverse: true
  # Phase 5.1 — Cloudflare DNS zone import (opt-in). Token: OCTO_CLOUDFLARE_API_TOKEN
  cloudflare:
    enabled: false
    api_token: ""
    zones: []                 # empty = all zones the token can list
    include_proxied: true
    include_unproxied: true
    flag_unproxied_a: true    # flag A/AAAA with proxied=false as misconfig
    timeout_seconds: 30
  # Phase 5.2 — Certificate Transparency subdomain discovery (opt-in)
  # Phase 8.2 extends this stage with an "otx" passive-DNS provider and a
  # wordlist brute-force pass — same subdomain-discovery stage, more sources.
  ct:
    enabled: false
    providers: [crtsh]        # crtsh | certspotter | otx (AlienVault OTX passive DNS, keyless)
    domains: []               # empty = base domains from input FQDNs
    max_subdomains: 5000
    timeout_seconds: 45
    brute_force:
      enabled: false
      wordlist_file: ""       # empty = built-in scanner/data/wordlists/subdomains-small.txt
      concurrency: 20
      max_candidates: 2000
      timeout_seconds: 5
  # Phase 8.1 — ASN/BGP org mapping (opt-in). Seed domain -> IP -> ASN ->
  # announced prefixes (RIPEstat, keyless). max_total_ips caps scope expansion
  # since one ASN can span far more than one org's infrastructure.
  asn:
    enabled: false
    domains: []               # empty = base domains from input FQDNs
    max_total_ips: 4096
    timeout_seconds: 15
  # Phase 8.3 — Cloud storage bucket enumeration (opt-in). Seed org token(s)
  # (derived from domains) -> candidate bucket/container names -> unauthenticated
  # HEAD/GET checks against S3, GCS, and Azure Blob's public REST endpoints.
  # Reported as findings only -- never merged into scan scope. max_candidates
  # and concurrency cap the probe burst against third-party cloud infra.
  cloud:
    enabled: false
    domains: []               # empty = base domains from input FQDNs
    providers: [s3, gcs]      # s3 | gcs | azure (azure is best-effort -- two-level namespace)
    wordlist_file: ""         # empty = built-in scanner/data/wordlists/bucket-names-small.txt
    concurrency: 10
    max_candidates: 500
    timeout_seconds: 8
    azure_container_probes: 10
  seed_alive_file: ""
  delta:
    enabled: false
    previous_run_dir: ""
    refresh_rate: 0.1
    refresh_seed: 0

ports:
  source: naabu
  # Scan protocol: tcp | udp | tcp_udp
  protocol: tcp
  custom_ports_file: scanner/inputs/ports.txt
  custom_udp_ports_file: scanner/inputs/ports_udp.txt
  top_udp_ports: 100
  udp_probes: true

# ssl-enum-ciphers must be present in the active profile's `scripts` for
# weak-cipher/protocol TLS posture findings (Phase 9.2) to populate; cert
# expiry/self-signed findings work off ssl-cert alone, already covered by
# nmap's default/safe categories.
nse_profiles:
  baseline:
    scripts: "default,safe"
    version_detection: true
    os_detection: true
  vuln:
    # Nmap "vuln" category + vulners CVE lookup by service version.
    # vulners queries the vulners.com API and needs outbound internet access.
    scripts: "default,safe,vuln,vulners,ssl-enum-ciphers"
    version_detection: true
    os_detection: true
  vuln-offline:
    # Fully offline CVE matching via vulscan's bundled local databases.
    scripts: "default,safe,vuln,vulscan/vulscan.nse"
    version_detection: true
    os_detection: true
  service_specific:
    scripts: "http-*,ssl-cert,ssl-enum-ciphers,smb-*,ssh-*,dns-*"
    version_detection: true
    os_detection: false

reporting:
  markdown_summary: true
  html_summary: true
  csv_export: true
  json_export: true
  # Business PDF for leadership / ticket attachments (written after reports + diff).
  pdf_summary: true
  pdf_title: "Octo-man Security Scan Report"
  pdf_org_name: ""
  pdf_max_vulnerabilities: 40
  # Compare hosts/ports/CVEs against the previous run (latest_run.json or previous_run_dir).
  diff:
    enabled: true
    previous_run_dir: ""
    markdown: true

# Post-scan enrichment for reports / Web UI.
enrichment:
  cvss4:
    enabled: true
    # Local CVE → CVSS v4 map. Refresh with: python3 scripts/fetch-cvss4-db.py
    database: scanner/data/cvss4/cvss4.json
  geoip:
    enabled: true
    # JSON overlay for labs/tests, or MaxMind GeoLite2-City.mmdb in production.
    # Fetch MMDB: MAXMIND_LICENSE_KEY=… ./scripts/fetch-geoip-db.sh
    database: scanner/data/geoip/geoip-overlay.json

# Tech stack fingerprinting (Phase 9.1): one HTTP GET per already-open web
# port -> CDN/WAF + CMS/framework signatures. Opt-in; findings only, never
# merged into scan scope.
fingerprint:
  enabled: false
  concurrency: 10
  max_targets: 1000
  timeout_seconds: 10
  body_max_bytes: 65536
  http_ports: [80, 8080, 8000, 8008, 8888]
  https_ports: [443, 8443]
  verify_tls: false   # self-signed/internal certs are common; TLS posture is Phase 9.2

# TLS / certificate posture (Phase 9.2): parses ssl-cert / ssl-enum-ciphers
# NSE script output already written by the nse stage -> cert expiry,
# self-signed heuristic, weak protocol/cipher findings. Opt-in; findings
# only, never merged into scan scope. Hostname/SAN-CN mismatch is out of
# scope (see tls_posture.py module docstring).
tls_posture:
  enabled: false
  max_targets: 2000
  expiring_soon_days: 30

# Slack / Telegram / SMTP notifications after reports. Prefer env credentials:
#   OCTO_SLACK_WEBHOOK, OCTO_TELEGRAM_BOT_TOKEN, OCTO_TELEGRAM_CHAT_ID
#   OCTO_SMTP_HOST, OCTO_SMTP_PORT, OCTO_SMTP_FROM, OCTO_SMTP_TO
# Enable with alerts.enabled: true or CLI --notify.
alerts:
  enabled: false
  min_severity: high
  on_diff_only: false
  slack:
    enabled: false
    webhook_url: ""
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  # Phase 5.3 — outbound mail via local Maddy (or any SMTP relay)
  smtp:
    enabled: false
    host: "127.0.0.1"
    port: 25
    from_addr: ""
    to_addrs: []
    username: ""
    password: ""
    use_starttls: false
    timeout_seconds: 30
    dkim_selector: ""
    require_dkim: false
    require_ptr: false
    ptr_hostname: ""

# DefectDojo export (Generic Findings Import via /api/v2/reimport-scan/).
# Prefer env credentials: OCTO_DEFECTDOJO_URL, OCTO_DEFECTDOJO_API_KEY
# Enable with defectdojo.enabled: true or CLI --export-defectdojo.
defectdojo:
  enabled: false
  url: ""
  api_key: ""
  product_name: "Octo-man"
  product_type_name: "Network"
  engagement_name: "Octo-man"
  test_title: "Octo-man NSE"
  min_severity: high
  include_without_cve: true
  close_old_findings: true
  active: true
  verified: false
  auto_create_context: true
  verify_ssl: true
  timeout_seconds: 60

# Optional in-container scheduler: python -m scanner.scheduler
# In Kubernetes prefer CronJob (k8s/octo-man); this helper is for local labs.
scheduler:
  enabled: false
  cron: "0 2 * * *"          # daily 02:00 UTC
  interval_seconds: 0        # if > 0, overrides cron
  mode: null                 # null = runtime.mode
  delta: false
  skip_nse: false
  notify: false
  export_defectdojo: false
  max_runs: 0                # 0 = forever
