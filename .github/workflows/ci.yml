name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff==0.15.20
      - name: Ruff check
        run: ruff check scanner api tests

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Compile sources
        run: python -m compileall scanner api tests agent
      - name: Start JetStream broker
        run: |
          docker run -d --name ci-nats-js -p 4222:4222 -p 8222:8222 \
            nats:2.10.24-alpine --jetstream --store_dir=/data --http_port=8222
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8222/healthz >/dev/null && break
            sleep 0.5
          done
      - name: Start Postgres (PRIMARY_DB — tenants + asset inventory, Phase 7)
        run: |
          docker run -d --name ci-postgres -p 5432:5432 \
            -e POSTGRES_DB=octo_man -e POSTGRES_USER=octo -e POSTGRES_PASSWORD=octo-ci-secret \
            postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec ci-postgres pg_isready -U octo -d octo_man >/dev/null 2>&1 && break
            sleep 0.5
          done
      - name: Apply Alembic migrations
        env:
          OCTO_POSTGRES_URL: postgresql+psycopg://octo:octo-ci-secret@127.0.0.1:5432/octo_man
        run: alembic -c api/db/alembic.ini upgrade head
      - name: Run tests
        env:
          OCTO_NATS_URL: nats://127.0.0.1:4222
          OCTO_POSTGRES_URL: postgresql+psycopg://octo:octo-ci-secret@127.0.0.1:5432/octo_man
        run: python -m pytest -q

  web:
    name: Web dashboard (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build

  kustomize:
    name: Kustomize (validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate overlays
        run: ./k8s/scripts/validate-kustomize.sh

  image:
    name: Image (build, smoke, e2e, scan, SBOM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: network-scan-cli:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-check toolchain in image
        run: |
          docker run --rm --entrypoint sh network-scan-cli:ci -c '
            set -e
            naabu -version
            dnsx -version
            nmap --version | head -n 1
            test -f /usr/share/nmap/scripts/nmap-vulners/vulners.nse
            test -f /usr/share/nmap/scripts/vulscan/vulscan.nse
            python -m compileall scanner
          '
      - name: End-to-end scan against a target container
        run: bash tests/e2e/run.sh network-scan-cli:ci
      - name: Light synthetic load test (16 targets)
        uses: ./.github/actions/synthetic-load-test
        with:
          image: network-scan-cli:ci
          build: "false"
          hosts: "16"
          config: tests/load/config.yaml
          resume_test: "false"
          scan_timeout_sec: "2400"
          metrics_path: load-metrics-ci-${{ github.run_id }}.json
          artifact_name: load-test-metrics-ci-${{ github.run_id }}
      - name: Trivy report (non-blocking, all severities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: network-scan-cli:ci
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
      - name: Trivy gate (fail on fixable CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: network-scan-cli:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "1"
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: network-scan-cli:ci
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json
          if-no-files-found: error
