name: Load test

on:
  workflow_dispatch:
    inputs:
      host_count:
        description: Number of synthetic target containers
        required: false
        default: "32"
        type: string
      resume_test:
        description: Interrupt mid-scan and verify --resume
        required: false
        default: true
        type: boolean
      config:
        description: Scanner config path (repo-relative)
        required: false
        default: tests/load/config-heavy.yaml
        type: string
  workflow_call:
    inputs:
      host_count:
        description: Number of synthetic target containers
        required: false
        default: "32"
        type: string
      resume_test:
        description: Interrupt mid-scan and verify --resume
        required: false
        default: false
        type: boolean
      config:
        description: Scanner config path (repo-relative)
        required: false
        default: tests/load/config-heavy.yaml
        type: string
  schedule:
    # Weekly heavy load test (Sunday 03:00 UTC) — no resume to stay within timeout.
    - cron: "0 3 * * 0"

permissions:
  contents: read

concurrency:
  group: load-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  heavy-load:
    name: Heavy synthetic load
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Resolve load-test inputs
        id: opts
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          # inputs.* for workflow_dispatch / workflow_call; event.inputs for dispatch only.
          HOSTS_INPUT: ${{ inputs.host_count || github.event.inputs.host_count || '32' }}
          CONFIG_INPUT: ${{ inputs.config || github.event.inputs.config || 'tests/load/config-heavy.yaml' }}
          # Do not use || on booleans — false is falsy in GitHub Expressions.
          RESUME_DISPATCH: ${{ github.event.inputs.resume_test }}
          RESUME_CALL: ${{ inputs.resume_test }}
        run: |
          set -euo pipefail
          hosts="${HOSTS_INPUT}"
          config="${CONFIG_INPUT}"

          case "${EVENT_NAME}" in
            schedule)
              resume="false"
              ;;
            workflow_call)
              if [[ "${RESUME_CALL}" == "true" ]]; then
                resume="true"
              else
                resume="false"
              fi
              ;;
            *)
              # workflow_dispatch default is true; string "false" disables resume.
              if [[ "${RESUME_DISPATCH}" == "false" ]]; then
                resume="false"
              else
                resume="true"
              fi
              ;;
          esac

          {
            echo "hosts=${hosts}"
            echo "config=${config}"
            echo "resume=${resume}"
            echo "run_id=gha-load-${GITHUB_RUN_ID}"
          } >> "${GITHUB_OUTPUT}"

          echo "Resolved: hosts=${hosts} config=${config} resume=${resume}"

      - name: Synthetic load test
        uses: ./.github/actions/synthetic-load-test
        with:
          image: network-scan-cli:load
          build: "true"
          hosts: ${{ steps.opts.outputs.hosts }}
          config: ${{ steps.opts.outputs.config }}
          resume_test: ${{ steps.opts.outputs.resume }}
          run_id: ${{ steps.opts.outputs.run_id }}
          checkpoint_timeout_sec: "120"
          scan_timeout_sec: "1800"
          metrics_path: load-metrics-${{ github.run_id }}.json
          artifact_name: load-test-metrics-${{ github.run_id }}
