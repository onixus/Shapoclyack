name: Load test

on:
  workflow_dispatch:
    inputs:
      host_count:
        description: Number of synthetic target containers
        required: false
        default: "32"
        type: string
      resume_test:
        description: Interrupt mid-scan and verify --resume
        required: false
        default: true
        type: boolean
  schedule:
    # Weekly heavy load test (Sunday 03:00 UTC) — no resume to stay within timeout.
    - cron: "0 3 * * 0"

permissions:
  contents: read

concurrency:
  group: load-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  heavy-load:
    name: Heavy synthetic load (${{ github.event.inputs.host_count || '32' }} hosts)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: network-scan-cli:load
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run heavy load test
        timeout-minutes: 45
        env:
          HOSTS: ${{ github.event.inputs.host_count || '32' }}
          # Scheduled runs skip resume (full scan only); manual dispatch defaults to resume test.
          RESUME: ${{ github.event_name == 'schedule' && '0' || (github.event.inputs.resume_test != false && '1' || '0') }}
          CHECKPOINT_TIMEOUT_SEC: "120"
          SCAN_TIMEOUT_SEC: "1800"
          METRICS_COPY_TO: ${{ github.workspace }}/load-metrics-${{ github.run_id }}.json
        run: |
          set -euo pipefail
          args=(network-scan-cli:load --hosts "${HOSTS}" --config tests/load/config-heavy.yaml --run-id "gha-load-${GITHUB_RUN_ID}")
          if [[ "${RESUME}" == "1" ]]; then
            args+=(--resume-test)
          fi
          bash tests/load/run.sh "${args[@]}"
      - name: Upload load-test metrics
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: load-test-metrics-${{ github.run_id }}
          path: load-metrics-${{ github.run_id }}.json
          if-no-files-found: ignore
