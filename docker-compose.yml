services:
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    image: network-scan-cli:latest
    container_name: network-scan-cli
    # naabu host discovery / SYN scans need raw socket capabilities.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    # Sized for aggressive /16 scans: fast profile (8× nmap) + 4× parallel naabu.
    mem_limit: 8g
    cpus: "8.0"
    ulimits:
      nproc: 1024
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./scanner/inputs:/app/scanner/inputs
      - ./scanner/config:/app/scanner/config
      - ./scanner/output:/app/scanner/output
      - ./scanner/state:/app/scanner/state
    command: ["--config", "scanner/config/default.yaml", "--mode", "fast"]
