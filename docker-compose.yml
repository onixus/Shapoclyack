services:
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    image: network-scan-cli:latest
    container_name: network-scan-cli
    # naabu host discovery / SYN scans need raw socket capabilities.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    # Sized for aggressive /16 scans: fast profile (8× nmap) + 4× parallel naabu.
    mem_limit: 8g
    cpus: "8.0"
    ulimits:
      nproc: 1024
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./scanner/inputs:/app/scanner/inputs
      - ./scanner/config:/app/scanner/config
      - ./scanner/output:/app/scanner/output
      - ./scanner/state:/app/scanner/state
    command: ["--config", "scanner/config/default.yaml", "--mode", "fast"]

  # Phase 2 API + React dashboard
  # UI: http://localhost:8080  (default users: admin/operator/viewer — change passwords)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: octo-man-api:latest
    container_name: octo-man-api
    ports:
      - "8080:8080"
    environment:
      OCTO_JWT_SECRET: ${OCTO_JWT_SECRET:-octo-man-dev-secret-change-me}
      OCTO_ALLOW_SCAN_START: ${OCTO_ALLOW_SCAN_START:-false}
      OCTO_OUTPUT_DIR: scanner/output
      OCTO_STATE_DIR: scanner/state
      OCTO_CONFIG: scanner/config/default.yaml
      OCTO_WEB_DIST: web/dist
    volumes:
      - ./scanner/inputs:/app/scanner/inputs
      - ./scanner/config:/app/scanner/config
      - ./scanner/output:/app/scanner/output
      - ./scanner/state:/app/scanner/state

  # Phase 1 scheduler: docker compose --profile scheduler up scheduler
  # Set scheduler.enabled: true in YAML or OCTO_SCHEDULER_ENABLED=true.
  scheduler:
    profiles: ["scheduler"]
    build:
      context: .
      dockerfile: Dockerfile
    image: network-scan-cli:latest
    container_name: network-scan-scheduler
    entrypoint: ["python", "-m", "scanner.scheduler"]
    environment:
      OCTO_SCHEDULER_ENABLED: "true"
      OCTO_SLACK_WEBHOOK: ${OCTO_SLACK_WEBHOOK:-}
      OCTO_TELEGRAM_BOT_TOKEN: ${OCTO_TELEGRAM_BOT_TOKEN:-}
      OCTO_TELEGRAM_CHAT_ID: ${OCTO_TELEGRAM_CHAT_ID:-}
    cap_add:
      - NET_RAW
      - NET_ADMIN
    mem_limit: 8g
    cpus: "8.0"
    volumes:
      - ./scanner/inputs:/app/scanner/inputs
      - ./scanner/config:/app/scanner/config
      - ./scanner/output:/app/scanner/output
      - ./scanner/state:/app/scanner/state
    command: ["--config", "scanner/config/default.yaml"]
