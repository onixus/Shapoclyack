# Shapoclyack all-in-one (Octo-man product: API + Web UI v2 + scanner tools).
# Web UI job start is enabled by default (OCTO_ALLOW_SCAN_START=true).
#
#   docker compose up --build
#   open http://localhost:8080  (operator / operator-change-me)
#
# Optional brokers (Phase 1 + 3):
#   # NATS with auto-wired OCTO_NATS_URL + health wait:
#   docker compose -f docker-compose.yml -f docker-compose.nats.yml --profile nats up --build
#   # NATS + ClickHouse ingest:
#   docker compose -f docker-compose.yml -f docker-compose.nats.yml -f docker-compose.clickhouse.yml \
#     --profile nats --profile clickhouse up --build

services:
  nats:
    image: nats:2.10.24-alpine
    profiles: ["nats"]
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    profiles: ["clickhouse"]
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: shapoclyack
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./k8s/octo-man/base/clickhouse/init-local.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  shapoclyack:
    build:
      context: .
      dockerfile: Dockerfile.allinone
    image: ghcr.io/onixus/shapoclyack-aio:0.3.2.1
    ports:
      - "8080:8080"
    environment:
      OCTO_JWT_SECRET: ${OCTO_JWT_SECRET:-octo-man-dev-secret-change-me}
      API_SECRET_KEY: ${API_SECRET_KEY:-}
      OCTO_ALLOW_SCAN_START: "true"
      OCTO_JOB_EXECUTION_MODE: local
      OCTO_CONFIG: scanner/config/default.yaml
      OCTO_OUTPUT_DIR: scanner/output
      OCTO_STATE_DIR: scanner/state
      OCTO_WEB_DIST: web/dist
      # Empty = HTTP-only. Auto-wire with docker-compose.nats.yml → nats://nats:4222
      OCTO_NATS_URL: ${OCTO_NATS_URL:-}
      OCTO_CLICKHOUSE_URL: ${OCTO_CLICKHOUSE_URL:-}
      OCTO_CH_INGEST_ENABLED: ${OCTO_CH_INGEST_ENABLED:-true}
    volumes:
      - ./scanner/inputs:/app/scanner/inputs
      - ./scanner/output:/app/scanner/output
      - ./scanner/state:/app/scanner/state
      - ./scanner/config:/app/scanner/config:ro
    cap_add:
      - NET_RAW
    restart: unless-stopped

volumes:
  nats-data:
  clickhouse-data:
