[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
# sqlalchemy.url is intentionally omitted — api/db/migrations/env.py reads
# OCTO_POSTGRES_URL at runtime so this file has no secrets/environment baked in.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
