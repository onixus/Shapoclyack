# Remote scanner agent Deployment (Phase 4).
# Not included in default base — enable via overlays/agents (see base/agents/).
# Requires Secret octo-man-agent and usually OCTO_JOB_EXECUTION_MODE=agent on the API.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-man-agent
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: octo-man
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octo-man
        app.kubernetes.io/component: agent
    spec:
      # Spread agents across zones and nodes (Phase 4.1).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: octo-man
              app.kubernetes.io/component: agent
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: octo-man
              app.kubernetes.io/component: agent
      containers:
        - name: agent
          image: ghcr.io/onixus/shapoclyack-aio:shapoclyack-0.36-0723
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "agent"]
          args:
            - "--config"
            - "scanner/config/k8s.yaml"
            - "--api-url"
            - "http://octo-man-api:8080"
          env:
            - name: OCTO_AGENT_PROVISIONING_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-man-agent
                  key: OCTO_AGENT_PROVISIONING_KEY
                  optional: true
            - name: OCTO_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: octo-man-agent
                  key: OCTO_AGENT_TOKEN
                  optional: true
            - name: OCTO_OUTPUT_DIR
              value: scanner/output
            - name: OCTO_AGENT_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OCTO_NATS_URL
              value: nats://octo-man-nats-client:4222
          securityContext:
            # This worker runs the full scanner pipeline (nmap -O / naabu need
            # NET_RAW+NET_ADMIN file capabilities, set at build time via
            # Dockerfile setcap, to take effect for the non-root user);
            # allowPrivilegeEscalation:false sets no_new_privs, which blocks
            # that file-capability grant on exec regardless of what's listed
            # below (matches job.yaml/cronjob.yaml's working config).
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
                - NET_ADMIN
          # Requests are a floor for scheduling; VPA may raise them (Phase 4.2).
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /app/scanner/config
              readOnly: true
            - name: work
              mountPath: /app/scanner/output
            - name: work-state
              mountPath: /app/scanner/state
      volumes:
        - name: config
          configMap:
            name: scanner-config
        - name: work
          emptyDir: {}
        - name: work-state
          emptyDir: {}
