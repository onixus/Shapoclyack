# NATS JetStream (Phase 1) — message broker for job dispatch and raw-result ingest.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: octo-man-nats
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: nats
spec:
  serviceName: octo-man-nats
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: octo-man
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octo-man
        app.kubernetes.io/component: nats
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: nats
          image: nats:2.10.24-alpine
          imagePullPolicy: IfNotPresent
          args:
            - "--jetstream"
            - "--store_dir=/data"
            - "--http_port=8222"
            - "--port=4222"
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nats-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: nats-data
        labels:
          app.kubernetes.io/name: octo-man
          app.kubernetes.io/component: nats
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
