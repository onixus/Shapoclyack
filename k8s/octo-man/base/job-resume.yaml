# Resume an interrupted scan. Not included in kustomization base — apply manually:
#   kubectl apply -f k8s/octo-man/base/job-resume.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: network-scan-resume
  namespace: network-scan
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: scan-job-resume
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  activeDeadlineSeconds: 14400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octo-man
        app.kubernetes.io/component: scan-job-resume
    spec:
      restartPolicy: Never
      serviceAccountName: scanner
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: scanner
          image: ghcr.io/onixus/octo-man:0.3.2.1
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /app/scanner/config/k8s.yaml
            - --mode
            - balanced
            - --resume
            # - --run-id
            # - "20260716T120000Z"
          resources:
            requests:
              cpu: "4"
              memory: 4Gi
            limits:
              cpu: "8"
              memory: 8Gi
          securityContext:
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: data
              mountPath: /app/scanner/output
              subPath: output
            - name: data
              mountPath: /app/scanner/state
              subPath: state
            - name: inputs
              mountPath: /app/scanner/inputs
              readOnly: true
            - name: config
              mountPath: /app/scanner/config
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: scanner-data
        - name: inputs
          secret:
            secretName: scan-targets
        - name: config
          configMap:
            name: scanner-config
