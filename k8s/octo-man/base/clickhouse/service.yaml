# Headless Service for StatefulSet peer DNS.
apiVersion: v1
kind: Service
metadata:
  name: octo-man-clickhouse
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: clickhouse
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
---
# Stable ClusterIP for API / consumers:
#   HTTP  http://octo-man-clickhouse-client:8123
#   Native octo-man-clickhouse-client:9000
apiVersion: v1
kind: Service
metadata:
  name: octo-man-clickhouse-client
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: clickhouse
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
