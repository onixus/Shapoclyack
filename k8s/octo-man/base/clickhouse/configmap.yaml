apiVersion: v1
kind: ConfigMap
metadata:
  name: octo-man-clickhouse-config
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: clickhouse
data:
  # Keep defaults; override paths for StatefulSet PVC mounts.
  config.xml: |
    <clickhouse>
      <logger>
        <level>information</level>
        <console>true</console>
      </logger>
      <path>/var/lib/clickhouse/</path>
      <tmp_path>/var/lib/clickhouse/tmp/</tmp_path>
      <user_files_path>/var/lib/clickhouse/user_files/</user_files_path>
      <format_schema_path>/var/lib/clickhouse/format_schemas/</format_schema_path>
      <display_name>octo-man-clickhouse</display_name>
      <listen_host>::</listen_host>
      <http_port>8123</http_port>
      <tcp_port>9000</tcp_port>
      <interserver_http_port>9009</interserver_http_port>
      <max_connections>4096</max_connections>
      <keep_alive_timeout>3</keep_alive_timeout>
      <max_concurrent_queries>100</max_concurrent_queries>
      <uncompressed_cache_size>8589934592</uncompressed_cache_size>
      <mark_cache_size>5368709120</mark_cache_size>
      <timezone>UTC</timezone>
      <mlock_executable>false</mlock_executable>
    </clickhouse>
  users.xml: |
    <clickhouse>
      <users>
        <default>
          <password></password>
          <networks>
            <ip>::/0</ip>
          </networks>
          <profile>default</profile>
          <quota>default</quota>
          <access_management>1</access_management>
        </default>
      </users>
      <profiles>
        <default>
          <max_memory_usage>4000000000</max_memory_usage>
          <use_uncompressed_cache>0</use_uncompressed_cache>
          <load_balancing>in_order</load_balancing>
        </default>
      </profiles>
      <quotas>
        <default>
          <interval>
            <duration>3600</duration>
            <queries>0</queries>
            <errors>0</errors>
            <result_rows>0</result_rows>
            <read_rows>0</read_rows>
            <execution_time>0</execution_time>
          </interval>
        </default>
      </quotas>
    </clickhouse>
  # First-boot schema (mounted at /docker-entrypoint-initdb.d/init.sql).
  # Runs only when the data PVC is empty.
  init.sql: |
    CREATE DATABASE IF NOT EXISTS shapoclyack;

    CREATE TABLE IF NOT EXISTS shapoclyack.shapoclyack_vulnerabilities (
        tenant_id UUID,
        asset_ip IPv4,
        cve_id String,
        base_cvss Float32,
        epss_score Float32,
        asset_criticality UInt8,
        exploit_active UInt8,
        cisa_decision Enum8('Track' = 1, 'Attend' = 2, 'Act' = 3, 'Immediate' = 4),
        contextual_score Float32,
        scoring_model_version String,
        timestamp DateTime
    ) ENGINE = ReplacingMergeTree()
    ORDER BY (tenant_id, asset_ip, cve_id);

    -- Port-state table (roadmap 3.3 keys: tenant_id, target_ip, port)
    CREATE TABLE IF NOT EXISTS shapoclyack.shapoclyack_open_ports (
        tenant_id UUID,
        target_ip IPv4,
        port UInt16,
        protocol LowCardinality(String),
        run_id String,
        timestamp DateTime
    ) ENGINE = ReplacingMergeTree()
    ORDER BY (tenant_id, target_ip, port);
