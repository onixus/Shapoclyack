apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: octo-man-postgres
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: postgres
spec:
  serviceName: octo-man-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: octo-man
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octo-man
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: client
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: octo_man
            - name: POSTGRES_USER
              value: octo
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-man-postgres
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "octo", "-d", "octo_man"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "octo", "-d", "octo_man"]
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: octo-man
          app.kubernetes.io/component: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
