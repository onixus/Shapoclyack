apiVersion: batch/v1
kind: CronJob
metadata:
  name: network-scan-scheduled
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: scan-cronjob
spec:
  # Sundays 02:00 UTC — change to match your cadence (replaces compose scheduler).
  schedule: "0 2 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 604800
      activeDeadlineSeconds: 14400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: octo-man
            app.kubernetes.io/component: scan-cronjob
        spec:
          restartPolicy: Never
          serviceAccountName: scanner
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: scanner
              image: ghcr.io/onixus/shapoclyack-aio:0.3.2.1
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "scanner.main"]
              args:
                - --config
                - /app/scanner/config/k8s.yaml
                - --mode
                - balanced
                - --delta
              envFrom:
                - secretRef:
                    name: octo-man-alerts
                    optional: true
              resources:
                requests:
                  cpu: "4"
                  memory: 4Gi
                limits:
                  cpu: "8"
                  memory: 8Gi
              securityContext:
                capabilities:
                  add:
                    - NET_RAW
                    - NET_ADMIN
                allowPrivilegeEscalation: true
              volumeMounts:
                - name: data
                  mountPath: /app/scanner/output
                  subPath: output
                - name: data
                  mountPath: /app/scanner/state
                  subPath: state
                - name: inputs
                  mountPath: /app/scanner/inputs
                  readOnly: true
                - name: config
                  mountPath: /app/scanner/config
                  readOnly: true
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: scanner-data
            - name: inputs
              secret:
                secretName: scan-targets
            - name: config
              configMap:
                name: scanner-config
