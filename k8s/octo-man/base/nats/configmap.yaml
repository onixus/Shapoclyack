apiVersion: v1
kind: ConfigMap
metadata:
  name: octo-man-nats-config
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: nats
data:
  nats.conf: |
    port: 4222
    http_port: 8222

    jetstream {
      store_dir: /data
      max_mem: 256M
      max_file: 4G
    }

    server_name: octo-man-nats
