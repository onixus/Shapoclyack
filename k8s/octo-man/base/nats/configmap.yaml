apiVersion: v1
kind: ConfigMap
metadata:
  name: octo-man-nats-config
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: nats
data:
  nats.conf: |
    port: 4222
    http_port: 8222

    jetstream {
      store_dir: /data
      max_mem: 256M
      max_file: 4G
    }

    # $SERVER_NAME (pod name, e.g. octo-man-nats-0) keeps cluster peers
    # distinct; set via downward API in statefulset.yaml.
    server_name: $SERVER_NAME

    # Cluster block is safe at replicas=1 (no peers to route to — a single
    # node just runs standalone). Bump `spec.replicas` to 3 (see
    # examples/nats-ha-patch.yaml) to form a real JetStream cluster; also set
    # OCTO_NATS_STREAM_REPLICAS=3 on the API so streams replicate R3.
    cluster {
      name: octo-man-nats
      port: 6222
      routes: [
        nats://octo-man-nats-0.octo-man-nats:6222
        nats://octo-man-nats-1.octo-man-nats:6222
        nats://octo-man-nats-2.octo-man-nats:6222
      ]
    }
