# Headless Service for StatefulSet DNS (octo-man-nats-0.octo-man-nats).
apiVersion: v1
kind: Service
metadata:
  name: octo-man-nats
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: nats
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: nats
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: monitor
      port: 8222
      targetPort: monitor
---
# Stable ClusterIP for API / agents: nats://octo-man-nats-client:4222
apiVersion: v1
kind: Service
metadata:
  name: octo-man-nats-client
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: nats
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: nats
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: monitor
      port: 8222
      targetPort: monitor
