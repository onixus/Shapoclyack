# Scanner config for Kubernetes (mounted at /app/scanner/config/k8s.yaml).
# Prefer vuln-offline in-cluster unless the pod has egress for vulners.com.

runtime:
  mode: balanced
  output_dir: scanner/output
  state_dir: scanner/state
  logs_dir: scanner/output/logs
  retries: 2
  timeout_seconds: 7200
  nse_timeout_seconds: 600
  nse_concurrency: 2
  nse_max_rate: 1500
  nse_hosts_per_scan: 8
  discover_concurrency: 2
  ports_concurrency: 2
  skip_nse: false
  keep_intermediate: true
  per_run_output: true
  log_max_bytes: 10485760
  log_backup_count: 5

profiles:
  safe:
    discover_rate: 1000
    port_rate: 1000
    top_ports: 100
    nmap_timing: T3
    nse_profile: baseline
    nse_concurrency: 2
    nse_max_rate: 500
  balanced:
    discover_rate: 2000
    port_rate: 2000
    top_ports: 1000
    nmap_timing: T4
    nse_profile: vuln-offline
    nse_concurrency: 2
    nse_max_rate: 1500
  fast:
    discover_rate: 5000
    port_rate: 5000
    top_ports: 1000
    nmap_timing: T4
    nse_profile: vuln-offline
    nse_concurrency: 4
    nse_max_rate: 3000

batching:
  enabled: true
  ipv4_prefix: 20
  max_targets_per_batch: 4096

discovery:
  source: naabu
  profile: auto
  skip_discovery: false
  skip_known_alive: true
  disjoint_batches: true
  adaptive:
    enabled: true
    min_gap: 1
  exclude_alive: []
  exclude_last_octets: []
  verify:
    enabled: false
  icmp:
    enabled: false
    tool: fping
    timeout_ms: 500
    retries: 1
  tcp_probe:
    enabled: false
    ports: [80, 443, 22]
  probe_order: [icmp, tcp, naabu]
  hostnames:
    forward: true
    reverse: true
  seed_alive_file: ""
  delta:
    enabled: false
    previous_run_dir: ""
    refresh_rate: 0.1
    refresh_seed: 0

ports:
  source: naabu
  protocol: tcp
  custom_ports_file: scanner/inputs/ports.txt
  custom_udp_ports_file: scanner/inputs/ports_udp.txt
  top_udp_ports: 100
  udp_probes: true

nse_profiles:
  baseline:
    scripts: "default,safe"
    version_detection: true
    os_detection: true
  vuln:
    scripts: "default,safe,vuln,vulners"
    version_detection: true
    os_detection: true
  vuln-offline:
    scripts: "default,safe,vuln,vulscan/vulscan.nse"
    version_detection: true
    os_detection: true
  service_specific:
    scripts: "http-*,ssl-cert,smb-*,ssh-*,dns-*"
    version_detection: true
    os_detection: false

reporting:
  markdown_summary: true
  html_summary: true
  csv_export: true
  json_export: true
  diff:
    enabled: true
    previous_run_dir: ""
    markdown: true

alerts:
  enabled: false
  min_severity: high
  on_diff_only: false
  slack:
    enabled: false
    webhook_url: ""
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""

scheduler:
  enabled: false
  cron: "0 2 * * *"
  interval_seconds: 0
  mode: null
  delta: false
  skip_nse: false
  notify: false
  max_runs: 0
