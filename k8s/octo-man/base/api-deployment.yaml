apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-man-api
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: octo-man
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octo-man
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/onixus/shapoclyack-aio:shapoclyack-0.33
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OCTO_OUTPUT_DIR
              value: scanner/output
            - name: OCTO_STATE_DIR
              value: scanner/state
            - name: OCTO_CONFIG
              value: scanner/config/k8s.yaml
            - name: OCTO_WEB_DIST
              value: web/dist
            - name: OCTO_ALLOW_SCAN_START
              value: "true"
            - name: OCTO_JOB_EXECUTION_MODE
              value: local
            # Empty disables NATS (HTTP agent claim/upload only). Enable with:
            # nats://octo-man-nats-client:4222
            - name: OCTO_NATS_URL
              value: ""
            - name: OCTO_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: octo-man-api
                  key: jwt_secret
          envFrom:
            - secretRef:
                name: octo-man-api-users
                optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
          volumeMounts:
            - name: data
              mountPath: /app/scanner/output
              subPath: output
            - name: data
              mountPath: /app/scanner/state
              subPath: state
            - name: inputs
              mountPath: /app/scanner/inputs
              readOnly: true
            - name: config
              mountPath: /app/scanner/config
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: scanner-data
        - name: inputs
          secret:
            secretName: scan-targets
            optional: true
        - name: config
          configMap:
            name: scanner-config
