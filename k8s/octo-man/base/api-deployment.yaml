apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-man-api
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: octo-man
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octo-man
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # Runs Alembic migrations before any API replica starts — Postgres is a
      # hard dependency (tenant store lives there), and migrations aren't
      # safely idempotent across N replicas starting concurrently the way
      # ClickHouse's CREATE TABLE IF NOT EXISTS init-SQL is.
      initContainers:
        - name: migrate
          image: ghcr.io/onixus/shapoclyack-aio:shapoclyack-0.36-0723
          imagePullPolicy: IfNotPresent
          command: ["alembic", "-c", "api/db/alembic.ini", "upgrade", "head"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-man-postgres
                  key: password
            - name: OCTO_POSTGRES_URL
              value: postgresql+psycopg://octo:$(POSTGRES_PASSWORD)@octo-man-postgres-client:5432/octo_man
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: api
          image: ghcr.io/onixus/shapoclyack-aio:shapoclyack-0.36-0723
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OCTO_OUTPUT_DIR
              value: scanner/output
            - name: OCTO_STATE_DIR
              value: scanner/state
            - name: OCTO_CONFIG
              value: scanner/config/k8s.yaml
            - name: OCTO_WEB_DIST
              value: web/dist
            - name: OCTO_ALLOW_SCAN_START
              value: "true"
            - name: OCTO_JOB_EXECUTION_MODE
              value: local
            # Empty disables NATS (HTTP agent claim/upload only). Enable with:
            # nats://octo-man-nats-client:4222
            - name: OCTO_NATS_URL
              value: ""
            # Empty disables ClickHouse client / ingest worker. Enable with:
            # http://octo-man-clickhouse-client:8123
            - name: OCTO_CLICKHOUSE_URL
              value: ""
            - name: OCTO_CH_INGEST_ENABLED
              value: "true"
            # Required — the tenant store is Postgres-backed (Phase 7), unlike
            # the opt-in NATS/ClickHouse sidecars above.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-man-postgres
                  key: password
            - name: OCTO_POSTGRES_URL
              value: postgresql+psycopg://octo:$(POSTGRES_PASSWORD)@octo-man-postgres-client:5432/octo_man
            - name: OCTO_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: octo-man-api
                  key: jwt_secret
          envFrom:
            - secretRef:
                name: octo-man-api-users
                optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            # Local scans run inside this container by default
            # (OCTO_ALLOW_SCAN_START=true) — nmap -O / naabu need the
            # NET_RAW+NET_ADMIN file capabilities set on them at build time
            # (Dockerfile setcap) to actually take effect for the non-root
            # user; allowPrivilegeEscalation:false sets no_new_privs, which
            # blocks that file-capability grant on exec regardless of what's
            # listed below (matches job.yaml/cronjob.yaml's working config).
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
                - NET_ADMIN
          volumeMounts:
            - name: data
              mountPath: /app/scanner/output
              subPath: output
            - name: data
              mountPath: /app/scanner/state
              subPath: state
            - name: inputs
              mountPath: /app/scanner/inputs
              readOnly: true
            - name: config
              mountPath: /app/scanner/config
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: scanner-data
        - name: inputs
          secret:
            secretName: scan-targets
            optional: true
        - name: config
          configMap:
            name: scanner-config
