# Enable API agent job execution mode for the agents overlay.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-man-api
spec:
  template:
    spec:
      containers:
        - name: api
          env:
            - name: OCTO_JOB_EXECUTION_MODE
              value: agent
            - name: OCTO_NATS_URL
              value: nats://octo-man-nats-client:4222
