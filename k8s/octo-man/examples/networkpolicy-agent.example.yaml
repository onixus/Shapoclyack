# Restrict remote scanner agents: DNS + API (+ optional NATS) only.
# Apply with agent Deployment (examples/agent-deployment.example.yaml).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: octo-man-agent-egress
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: agent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: octo-man
      app.kubernetes.io/component: agent
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Octo-man API (ClusterIP)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: octo-man
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: 8080
    # NATS JetStream (optional Phase 1 job pull)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: octo-man
              app.kubernetes.io/component: nats
      ports:
        - protocol: TCP
          port: 4222
---
# API pod: allow ingress from agents + Ingress controller; egress for vulners/DD optional.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: octo-man-api-ingress
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: octo-man
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: octo-man
              app.kubernetes.io/component: agent
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
