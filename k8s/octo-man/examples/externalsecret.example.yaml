# Optional ExternalSecrets Operator template (Phase 2.4).
# Requires ESO installed in the cluster. Maps vault/SM keys → Kubernetes Secrets
# consumed by the API / agent Deployments (no plaintext keys in manifests).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: octo-man-api
  namespace: network-scan
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: octo-man-store
    kind: ClusterSecretStore
  target:
    name: octo-man-api
    creationPolicy: Owner
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: octo-man/api
        property: jwt_secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: octo-man-agent
  namespace: network-scan
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: octo-man-store
    kind: ClusterSecretStore
  target:
    name: octo-man-agent
    creationPolicy: Owner
  data:
    # Prefer per-tenant provisioning key (exchanged for agent JWT at runtime).
    - secretKey: OCTO_AGENT_PROVISIONING_KEY
      remoteRef:
        key: octo-man/agent
        property: provisioning_key
    # Optional legacy shared token for lab migrations.
    - secretKey: OCTO_AGENT_TOKEN
      remoteRef:
        key: octo-man/agent
        property: legacy_token
