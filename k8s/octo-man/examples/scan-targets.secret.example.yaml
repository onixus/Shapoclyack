# Example Secret with scan targets.
# Create from files:
#   kubectl create secret generic scan-targets -n network-scan \
#     --from-file=ranges.txt=./ranges.txt \
#     --from-file=domains.txt=./domains.txt \
#     --from-file=ports.txt=./ports.txt \
#     --from-file=ports_udp.txt=./ports_udp.txt
#
# Or edit and apply:
#   kubectl apply -f k8s/octo-man/examples/scan-targets.secret.example.yaml
apiVersion: v1
kind: Secret
metadata:
  name: scan-targets
  namespace: network-scan
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: scan-inputs
type: Opaque
stringData:
  ranges.txt: |
    # 10.0.0.0/24
  domains.txt: |
    # example.internal
  ports.txt: |
    80
    443
  ports_udp.txt: |
    # 53
