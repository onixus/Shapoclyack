# Example remote agent Deployment (scanner image). Prefer overlays/agents for
# production (topology spread + VPA). Pair with agent-mode-api-patch.yaml and
# Secret octo-man-agent.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-man-agent
  namespace: network-scan
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: octo-man
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octo-man
        app.kubernetes.io/component: agent
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: octo-man
              app.kubernetes.io/component: agent
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: octo-man
              app.kubernetes.io/component: agent
      containers:
        - name: agent
          image: ghcr.io/onixus/shapoclyack-aio:shapoclyack-0.35-0722
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "agent"]
          args:
            - "--config"
            - "scanner/config/k8s.yaml"
            - "--api-url"
            - "http://octo-man-api:8080"
          env:
            - name: OCTO_AGENT_PROVISIONING_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-man-agent
                  key: OCTO_AGENT_PROVISIONING_KEY
                  optional: true
            - name: OCTO_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: octo-man-agent
                  key: OCTO_AGENT_TOKEN
                  optional: true
            - name: OCTO_OUTPUT_DIR
              value: scanner/output
            - name: OCTO_AGENT_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Optional Phase 1 JetStream job pull (see nats-agent-patch.yaml):
            # - name: OCTO_NATS_URL
            #   value: nats://octo-man-nats-client:4222
          securityContext:
            # This worker runs the full scanner pipeline (nmap -O / naabu need
            # the NET_RAW file capability, set at build time via Dockerfile
            # setcap, to take effect for the non-root user);
            # allowPrivilegeEscalation:false sets no_new_privs, which blocks
            # that file-capability grant on exec entirely regardless of
            # what's listed below (matches job.yaml/cronjob.yaml's working
            # config).
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /app/scanner/config
              readOnly: true
            - name: work
              mountPath: /app/scanner/output
            - name: work-state
              mountPath: /app/scanner/state
      volumes:
        - name: config
          configMap:
            name: scanner-config
        - name: work
          emptyDir: {}
        - name: work-state
          emptyDir: {}
