# Example remote agent Deployment (scanner image). Not applied by default kustomize.
# Pair with API agent mode (see agent-mode-api-patch.yaml) and Secret octo-man-agent.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-man-agent
  namespace: network-scan
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: octo-man
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octo-man
        app.kubernetes.io/component: agent
    spec:
      containers:
        - name: agent
          image: ghcr.io/onixus/shapoclyack-aio:shapoclyack-0.33
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "agent"]
          args:
            - "--config"
            - "scanner/config/k8s.yaml"
            - "--api-url"
            - "http://octo-man-api:8080"
          env:
            - name: OCTO_AGENT_PROVISIONING_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-man-agent
                  key: OCTO_AGENT_PROVISIONING_KEY
                  optional: true
            - name: OCTO_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: octo-man-agent
                  key: OCTO_AGENT_TOKEN
                  optional: true
            - name: OCTO_OUTPUT_DIR
              value: scanner/output
            - name: OCTO_AGENT_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Optional Phase 1 JetStream job pull (see nats-agent-patch.yaml):
            # - name: OCTO_NATS_URL
            #   value: nats://octo-man-nats-client:4222
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /app/scanner/config
              readOnly: true
            - name: work
              mountPath: /app/scanner/output
            - name: work-state
              mountPath: /app/scanner/state
      volumes:
        - name: config
          configMap:
            name: scanner-config
        - name: work
          emptyDir: {}
        - name: work-state
          emptyDir: {}
