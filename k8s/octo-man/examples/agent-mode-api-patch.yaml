# Switch the default aio API Deployment to remote-agent execution mode.
# Workers claim jobs and upload run archives (see agent-deployment.example.yaml).
#
# Required:
#   OCTO_JOB_EXECUTION_MODE=agent
#   OCTO_ALLOW_SCAN_START=true
#   OCTO_AGENT_TOKEN=<from secret octo-man-agent>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-man-api
spec:
  template:
    spec:
      containers:
        - name: api
          env:
            - name: OCTO_JOB_EXECUTION_MODE
              value: agent
            - name: OCTO_ALLOW_SCAN_START
              value: "true"
            - name: OCTO_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: octo-man-agent
                  key: OCTO_AGENT_TOKEN
