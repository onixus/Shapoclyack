# Strategic-merge style notes for running the API in remote-agent mode.
# Apply on top of the base API Deployment when workers should claim jobs
# and upload run archives (base mounts are read-only for results-only UI).
#
# Required env (via Deployment env / Secret):
#   OCTO_JOB_EXECUTION_MODE=agent
#   OCTO_ALLOW_SCAN_START=true
#   OCTO_AGENT_TOKEN=<from secret octo-man-agent>
#
# Volume mounts must be writable for ingest:
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-man-api
spec:
  template:
    spec:
      containers:
        - name: api
          env:
            - name: OCTO_JOB_EXECUTION_MODE
              value: agent
            - name: OCTO_ALLOW_SCAN_START
              value: "true"
            - name: OCTO_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: octo-man-agent
                  key: OCTO_AGENT_TOKEN
          volumeMounts:
            - name: data
              mountPath: /app/scanner/output
              subPath: output
              readOnly: false
            - name: data
              mountPath: /app/scanner/state
              subPath: state
              readOnly: false
