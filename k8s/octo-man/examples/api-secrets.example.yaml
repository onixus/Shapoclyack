# API auth secrets — change defaults before any real deployment.
apiVersion: v1
kind: Secret
metadata:
  name: octo-man-api
  namespace: network-scan
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: api
type: Opaque
stringData:
  jwt_secret: replace-with-long-random-string
---
# Optional: override default demo users (JSON list).
# If omitted, the API image falls back to built-in demo users.
apiVersion: v1
kind: Secret
metadata:
  name: octo-man-api-users
  namespace: network-scan
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: api
type: Opaque
stringData:
  OCTO_API_USERS: |
    [
      {"username":"admin","password":"replace-me","role":"admin"},
      {"username":"operator","password":"replace-me","role":"operator"},
      {"username":"viewer","password":"replace-me","role":"viewer"}
    ]
---
# Optional Slack / Telegram credentials for CronJob / Job --notify.
apiVersion: v1
kind: Secret
metadata:
  name: octo-man-alerts
  namespace: network-scan
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: alerts
type: Opaque
stringData:
  OCTO_SLACK_WEBHOOK: ""
  OCTO_TELEGRAM_BOT_TOKEN: ""
  OCTO_TELEGRAM_CHAT_ID: ""
---
# DefectDojo export credentials (optional; pair with --export-defectdojo / defectdojo.enabled).
apiVersion: v1
kind: Secret
metadata:
  name: octo-man-defectdojo
  namespace: network-scan
  labels:
    app.kubernetes.io/name: octo-man
    app.kubernetes.io/component: defectdojo
type: Opaque
stringData:
  OCTO_DEFECTDOJO_URL: "https://defectdojo.example.com"
  OCTO_DEFECTDOJO_API_KEY: ""
