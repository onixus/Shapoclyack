# Пример Secret с целями сканирования.
# Создать из своих файлов:
#   kubectl create secret generic scan-targets -n network-scan \
#     --from-file=ranges.txt=./ranges.txt \
#     --from-file=domains.txt=./domains.txt \
#     --from-file=ports.txt=./ports.txt
#
# Или применить (после правки):
#   kubectl apply -f k8s/network-scan-cli/examples/scan-targets.secret.example.yaml
apiVersion: v1
kind: Secret
metadata:
  name: scan-targets
  namespace: network-scan
  labels:
    app.kubernetes.io/name: network-scan-cli
    app.kubernetes.io/component: scan-inputs
type: Opaque
stringData:
  ranges.txt: |
    # 10.0.0.0/24
  domains.txt: |
    # example.internal
  ports.txt: |
    80
    443
